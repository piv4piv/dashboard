<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイダッシュボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f0f2f5;
      color: #333;
      height: 100vh;
      overflow: hidden;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 320px 1fr 280px;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 12px;
      height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card h2 {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    /* 時計 */
    .clock-card {
      grid-column: 1; grid-row: 1;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      min-height: 130px;
    }
    .clock-card h2 { color: rgba(255,255,255,0.7); }
    #clock-time { font-size: 52px; font-weight: 200; letter-spacing: -2px; line-height: 1; }
    #clock-date { font-size: 14px; margin-top: 6px; opacity: 0.85; }

    /* ToDo */
    .todo-card { grid-column: 1; grid-row: 2; display: flex; flex-direction: column; }
    .todo-input-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .todo-input-row input {
      flex: 1; border: 1.5px solid #e5e7eb; border-radius: 8px;
      padding: 8px 10px; font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .todo-input-row input:focus { border-color: #4f46e5; }
    .todo-input-row button {
      background: #4f46e5; color: white; border: none;
      border-radius: 8px; padding: 8px 14px; font-size: 18px; cursor: pointer;
    }
    .todo-input-row button:hover { background: #4338ca; }
    #todo-list { list-style: none; overflow-y: auto; flex: 1; }
    #todo-list li {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 4px; border-bottom: 1px solid #f3f4f6;
      font-size: 14px; cursor: pointer; transition: opacity 0.2s;
    }
    #todo-list li.done { opacity: 0.4; text-decoration: line-through; }
    #todo-list li .check {
      width: 18px; height: 18px; border: 2px solid #d1d5db;
      border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #todo-list li.done .check { background: #4f46e5; border-color: #4f46e5; color: white; font-size: 11px; }
    #todo-list li .del { margin-left: auto; color: #d1d5db; font-size: 16px; padding: 0 4px; cursor: pointer; }
    #todo-list li .del:hover { color: #ef4444; }

    /* カレンダー */
    .calendar-card {
      grid-column: 2; grid-row: 1 / 3;
      display: flex; flex-direction: column;
    }
    .calendar-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 12px;
    }
    .calendar-header span { font-size: 16px; font-weight: 600; }
    .calendar-header button {
      background: none; border: 1.5px solid #e5e7eb; border-radius: 8px;
      padding: 4px 10px; cursor: pointer; font-size: 14px; color: #555;
    }
    .calendar-header button:hover { background: #f3f4f6; }

    /* Googleログインボタン */
    .gcal-login-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; padding: 8px 10px;
      background: #f9fafb; border-radius: 10px; font-size: 12px;
    }
    .gcal-login-bar span { color: #6b7280; }
    .gcal-btn {
      display: flex; align-items: center; gap: 6px;
      background: #fff; border: 1.5px solid #e5e7eb; border-radius: 8px;
      padding: 5px 12px; font-size: 12px; cursor: pointer;
      color: #333; font-weight: 500; transition: background 0.2s;
    }
    .gcal-btn:hover { background: #f3f4f6; }
    .gcal-btn img { width: 16px; height: 16px; }
    .gcal-btn.logout { color: #ef4444; border-color: #fecaca; }
    .gcal-btn.logout:hover { background: #fef2f2; }

    .calendar-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 1fr;
      gap: 2px; flex: 1; overflow: hidden;
    }
    .cal-day-label {
      text-align: center; font-size: 11px; font-weight: 600;
      color: #9ca3af; padding: 4px 0;
    }
    .cal-day {
      display: flex; flex-direction: column;
      align-items: flex-start; padding: 4px 5px;
      border-radius: 8px; font-size: 12px; cursor: pointer;
      transition: background 0.15s; color: #333;
      overflow: hidden; min-height: 0;
      border: 1px solid transparent;
    }
    .cal-day:hover { background: #f3f4f6; }
    .cal-day.today { border-color: #4f46e5; }
    .cal-day.other-month { color: #d1d5db; }
    .cal-day.sunday { color: #ef4444; }
    .cal-day.saturday { color: #3b82f6; }
    .cal-day .day-num {
      font-size: 12px; font-weight: 600; line-height: 1.4;
      width: 22px; height: 22px; display: flex;
      align-items: center; justify-content: center;
      border-radius: 50%; flex-shrink: 0;
    }
    .cal-day.today .day-num {
      background: #4f46e5; color: white;
    }
    .cal-day .event-chip {
      font-size: 10px; padding: 1px 5px;
      background: #ede9fe; color: #4f46e5; font-weight: 700;
      border-radius: 4px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      width: 100%; margin-top: 2px; line-height: 1.5;
    }
    .cal-day.other-month .event-chip { background: #f3f4f6; color: #9ca3af; }
    .cal-day .event-more {
      font-size: 10px; color: #9ca3af;
      margin-top: 2px; padding-left: 2px;
    }

    /* 予定ポップオーバー */
    .event-popover {
      position: fixed; background: white; border-radius: 12px;
      padding: 12px 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      z-index: 100; min-width: 200px; max-width: 280px;
      font-size: 13px; display: none;
    }
    .event-popover h3 { font-size: 12px; color: #888; margin-bottom: 8px; }
    .event-popover ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .event-popover ul li {
      display: flex; align-items: flex-start; gap: 8px;
    }
    .event-popover ul li .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4f46e5; flex-shrink: 0; margin-top: 4px;
    }

    /* 健康情報 */
    .health-card { grid-column: 3; grid-row: 1; min-height: 130px; }
    .health-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-item { background: #f9fafb; border-radius: 10px; padding: 10px; text-align: center; }
    .stat-item .stat-icon { font-size: 20px; margin-bottom: 2px; }
    .stat-item .stat-value { font-size: 18px; font-weight: 700; color: #4f46e5; }
    .stat-item .stat-label { font-size: 10px; color: #9ca3af; margin-top: 2px; }
    .health-note { font-size: 11px; color: #d1d5db; text-align: center; margin-top: 8px; }

    /* Notion */
    .notion-card { grid-column: 3; grid-row: 2; display: flex; flex-direction: column; }
    .notion-placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f9fafb; border-radius: 10px;
      color: #9ca3af; font-size: 13px; text-align: center;
      padding: 16px; gap: 8px;
    }
    .notion-placeholder span { font-size: 28px; }
    #notion-list { list-style: none; overflow-y: auto; flex: 1; }
    #notion-list li {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 4px; border-bottom: 1px solid #f3f4f6;
      font-size: 13px;
    }
    #notion-list li.done { opacity: 0.4; text-decoration: line-through; }
    #notion-list li .check {
      width: 16px; height: 16px; border: 2px solid #d1d5db;
      border-radius: 4px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
    }
    #notion-list li.done .check { background: #4f46e5; border-color: #4f46e5; color: white; }
  </style>
</head>
<body>
  <div class="dashboard">

    <!-- 時計 -->
    <div class="card clock-card">
      <h2>現在時刻</h2>
      <div id="clock-time">00:00</div>
      <div id="clock-date">読み込み中...</div>
    </div>

    <!-- ToDo -->
    <div class="card todo-card">
      <h2>ToDoリスト</h2>
      <div class="todo-input-row">
        <input type="text" id="todo-input" placeholder="新しいタスクを入力..." />
        <button onclick="addTodo()">＋</button>
      </div>
      <ul id="todo-list"></ul>
    </div>

    <!-- カレンダー -->
    <div class="card calendar-card">
      <div class="calendar-header">
        <button onclick="changeMonth(-1)">＜</button>
        <span id="calendar-title"></span>
        <button onclick="changeMonth(1)">＞</button>
      </div>

      <!-- Googleログインバー -->
      <div class="gcal-login-bar">
        <span id="gcal-status">Googleカレンダー未連携</span>
        <button class="gcal-btn" id="gcal-btn" onclick="handleGcalAuth()">
          <img src="https://www.google.com/favicon.ico" alt="Google" />
          Googleでログイン
        </button>
      </div>

      <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <!-- 健康情報 -->
    <div class="card health-card">
      <h2>健康情報</h2>
      <div class="health-stats">
        <div class="stat-item">
          <div class="stat-icon">👟</div>
          <div class="stat-value" id="steps">—</div>
          <div class="stat-label">歩数</div>
        </div>
        <div class="stat-item">
          <div class="stat-icon">❤️</div>
          <div class="stat-value" id="heart">—</div>
          <div class="stat-label">心拍数</div>
        </div>
        <div class="stat-item">
          <div class="stat-icon">😴</div>
          <div class="stat-value" id="sleep">—</div>
          <div class="stat-label">睡眠(h)</div>
        </div>
        <div class="stat-item">
          <div class="stat-icon">🔥</div>
          <div class="stat-value" id="calories">—</div>
          <div class="stat-label">カロリー</div>
        </div>
      </div>
      <div class="health-note">※ Garmin連携は後ほど設定</div>
    </div>

    <!-- Notion -->
    <div class="card notion-card">
      <h2>Notion Todo</h2>
      <div id="notion-auth-form" style="display:none; margin-bottom:10px;">
        <div style="font-size:12px; color:#6b7280; margin-bottom:6px;">認証キーを入力してください</div>
        <div style="display:flex; gap:6px;">
          <input type="password" id="notion-key-input" placeholder="パスワード"
            style="flex:1; border:1.5px solid #e5e7eb; border-radius:8px; padding:6px 10px; font-size:13px; outline:none;" />
          <button onclick="saveNotionKey()"
            style="background:#4f46e5; color:white; border:none; border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer;">
            保存
          </button>
        </div>
      </div>
      <ul id="notion-list"><li style="color:#9ca3af;font-size:13px;padding:8px 0">読み込み中...</li></ul>
    </div>

  </div>

  <!-- 予定ポップオーバー -->
  <div class="event-popover" id="event-popover">
    <h3 id="popover-date"></h3>
    <ul id="popover-events"></ul>
  </div>

  <!-- Google API -->
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="https://apis.google.com/js/api.js" async></script>

  <script>
    // ===== 設定 =====
    const CLIENT_ID = '397439923807-1ekl6t1orsaep2kdopmk79p1jft21j9r.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

    // ===== 時計 =====
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock-time').textContent = `${h}:${m}`;
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      const y = now.getFullYear();
      const mo = now.getMonth() + 1;
      const d = now.getDate();
      document.getElementById('clock-date').textContent =
        `${y}年${mo}月${d}日（${days[now.getDay()]}）`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ===== カレンダー =====
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let calendarEvents = {}; // { "2026-04-06": ["予定名", ...] }
    let tokenClient = null;
    let accessToken = null;

    function dateKey(y, m, d) {
      return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function renderCalendar() {
      const title = document.getElementById('calendar-title');
      const grid = document.getElementById('calendar-grid');
      title.textContent = `${currentYear}年${currentMonth + 1}月`;
      grid.innerHTML = '';

      const dayLabels = ['日', '月', '火', '水', '木', '金', '土'];
      dayLabels.forEach((label, i) => {
        const el = document.createElement('div');
        el.className = 'cal-day-label';
        el.textContent = label;
        if (i === 0) el.style.color = '#fca5a5';
        if (i === 6) el.style.color = '#93c5fd';
        grid.appendChild(el);
      });

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();
      const today = new Date();

      for (let i = firstDay - 1; i >= 0; i--) {
        const el = document.createElement('div');
        el.className = 'cal-day other-month';
        el.textContent = daysInPrev - i;
        grid.appendChild(el);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const el = document.createElement('div');
        const dow = (firstDay + d - 1) % 7;
        let cls = 'cal-day';
        if (dow === 0) cls += ' sunday';
        if (dow === 6) cls += ' saturday';
        if (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) cls += ' today';
        el.className = cls;

        const dayNum = document.createElement('div');
        dayNum.className = 'day-num';
        dayNum.textContent = d;
        el.appendChild(dayNum);

        // 予定を直接表示（最大2件）
        const key = dateKey(currentYear, currentMonth, d);
        const events = calendarEvents[key] || [];
        const showCount = Math.min(events.length, 2);
        for (let i = 0; i < showCount; i++) {
          const chip = document.createElement('div');
          chip.className = 'event-chip';
          chip.textContent = events[i];
          chip.title = events[i];
          el.appendChild(chip);
        }
        if (events.length > 2) {
          const more = document.createElement('div');
          more.className = 'event-more';
          more.textContent = `+${events.length - 2}件`;
          el.appendChild(more);
        }

        // クリックで全予定表示
        el.addEventListener('click', (e) => showPopover(e, currentYear, currentMonth, d));
        grid.appendChild(el);
      }

      const total = firstDay + daysInMonth;
      const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
      for (let d = 1; d <= remaining; d++) {
        const el = document.createElement('div');
        el.className = 'cal-day other-month';
        el.textContent = d;
        grid.appendChild(el);
      }
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar();
      if (accessToken) fetchCalendarEvents();
    }

    // ===== 予定ポップオーバー =====
    function showPopover(e, y, m, d) {
      const key = dateKey(y, m, d);
      const events = calendarEvents[key] || [];
      const popover = document.getElementById('event-popover');
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      const dow = new Date(y, m, d).getDay();

      document.getElementById('popover-date').textContent =
        `${y}年${m+1}月${d}日（${days[dow]}）`;

      const ul = document.getElementById('popover-events');
      ul.innerHTML = '';
      if (events.length === 0) {
        ul.innerHTML = '<li style="color:#9ca3af">予定なし</li>';
      } else {
        events.forEach(ev => {
          const li = document.createElement('li');
          li.innerHTML = `<div class="dot"></div><span>${ev}</span>`;
          ul.appendChild(li);
        });
      }

      const rect = e.target.closest('.cal-day').getBoundingClientRect();
      popover.style.display = 'block';
      popover.style.left = `${Math.min(rect.left, window.innerWidth - 300)}px`;
      popover.style.top = `${rect.bottom + 6}px`;
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.cal-day') && !e.target.closest('.event-popover')) {
        document.getElementById('event-popover').style.display = 'none';
      }
    });

    // ===== Google Calendar 認証 =====
    function initGoogleAuth() {
      if (typeof google === 'undefined') {
        setTimeout(initGoogleAuth, 500);
        return;
      }
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (response) => {
          if (response.error) return; // 自動ログイン失敗時は何もしない
          if (response.access_token) {
            accessToken = response.access_token;
            updateGcalUI(true);
            fetchCalendarEvents();
          }
        },
      });

      // ページ読み込み時に自動で再認証を試みる（過去に許可済みなら成功）
      tokenClient.requestAccessToken({ prompt: 'none' });
    }

    function handleGcalAuth() {
      if (accessToken) {
        // ログアウト
        google.accounts.oauth2.revoke(accessToken, () => {
          accessToken = null;
          calendarEvents = {};
          updateGcalUI(false);
          renderCalendar();
        });
      } else {
        tokenClient.requestAccessToken();
      }
    }

    function updateGcalUI(loggedIn) {
      const status = document.getElementById('gcal-status');
      const btn = document.getElementById('gcal-btn');
      if (loggedIn) {
        status.textContent = 'Googleカレンダー連携中';
        status.style.color = '#4f46e5';
        btn.className = 'gcal-btn logout';
        btn.innerHTML = 'ログアウト';
      } else {
        status.textContent = 'Googleカレンダー未連携';
        status.style.color = '';
        btn.className = 'gcal-btn';
        btn.innerHTML = '<img src="https://www.google.com/favicon.ico" alt="Google" />Googleでログイン';
      }
    }

    async function fetchCalendarEvents() {
      if (!accessToken) return;
      const startOfMonth = new Date(currentYear, currentMonth, 1).toISOString();
      const endOfMonth = new Date(currentYear, currentMonth + 1, 0, 23, 59, 59).toISOString();
      try {
        // まず全カレンダー一覧を取得
        const calListRes = await fetch(
          'https://www.googleapis.com/calendar/v3/users/me/calendarList',
          { headers: { Authorization: `Bearer ${accessToken}` } }
        );
        const calListData = await calListRes.json();
        if (calListData.error) {
          document.getElementById('gcal-status').textContent = 'エラー：' + calListData.error.message;
          return;
        }

        // 全カレンダーから予定を取得
        calendarEvents = {};
        let totalCount = 0;
        const calNames = (calListData.items || []).map(c => c.summary).join('、');
        document.getElementById('gcal-status').textContent =
          `カレンダー取得中（${(calListData.items||[]).length}個：${calNames}）`;

        for (const cal of (calListData.items || [])) {
          const res = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${startOfMonth}&timeMax=${endOfMonth}&singleEvents=true&maxResults=100`,
            { headers: { Authorization: `Bearer ${accessToken}` } }
          );
          const data = await res.json();
          if (data.error) continue;

          (data.items || []).forEach(event => {
            const dateStr = event.start?.date || event.start?.dateTime?.substring(0, 10);
            if (!dateStr) return;
            if (!calendarEvents[dateStr]) calendarEvents[dateStr] = [];
            calendarEvents[dateStr].push(event.summary || '（タイトルなし）');
            totalCount++;
          });
        }

        document.getElementById('gcal-status').textContent =
          `Googleカレンダー連携中（${totalCount}件）`;

        renderCalendar();
      } catch (e) {
        document.getElementById('gcal-status').textContent = 'エラー：' + e.message;
      }
    }

    // ===== ToDoリスト =====
    let todos = JSON.parse(localStorage.getItem('dashboard-todos') || '[]');

    function saveTodos() { localStorage.setItem('dashboard-todos', JSON.stringify(todos)); }

    function renderTodos() {
      const list = document.getElementById('todo-list');
      list.innerHTML = '';
      todos.forEach((todo, i) => {
        const li = document.createElement('li');
        li.className = todo.done ? 'done' : '';
        li.innerHTML = `
          <div class="check" onclick="toggleTodo(${i})">${todo.done ? '✓' : ''}</div>
          <span onclick="toggleTodo(${i})">${todo.text}</span>
          <span class="del" onclick="deleteTodo(${i})">×</span>
        `;
        list.appendChild(li);
      });
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ text, done: false });
      saveTodos(); renderTodos();
      input.value = ''; input.focus();
    }

    function toggleTodo(i) { todos[i].done = !todos[i].done; saveTodos(); renderTodos(); }
    function deleteTodo(i) { todos.splice(i, 1); saveTodos(); renderTodos(); }

    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    // ===== Notion Todo =====
    const NOTION_WORKER = 'https://notion-proxy.temptic-cat.workers.dev';
    const NOTION_DB_ID = '33a4da79-19cd-8093-aeff-e22fc0b3afda';
    let NOTION_AUTH_KEY = localStorage.getItem('notion_auth_key') || '';

    function saveNotionKey() {
      const key = document.getElementById('notion-key-input').value.trim();
      if (!key) return;
      localStorage.setItem('notion_auth_key', key);
      NOTION_AUTH_KEY = key;
      document.getElementById('notion-auth-form').style.display = 'none';
      fetchNotionTodos();
    }

    async function fetchNotionTodos() {
      if (!NOTION_AUTH_KEY) {
        document.getElementById('notion-list').innerHTML =
          '<li style="color:#9ca3af;font-size:13px;padding:8px 0">⚙️ 認証キーを設定してください</li>';
        document.getElementById('notion-auth-form').style.display = 'block';
        return;
      }
      try {
        const res = await fetch(`${NOTION_WORKER}/?database_id=${NOTION_DB_ID}&auth=${encodeURIComponent(NOTION_AUTH_KEY)}`);
        const data = await res.json();
        const list = document.getElementById('notion-list');
        list.innerHTML = '';

        if (!data.results || data.results.length === 0) {
          list.innerHTML = '<li style="color:#9ca3af;font-size:13px;padding:8px 0">タスクなし</li>';
          return;
        }

        data.results.forEach(page => {
          const props = page.properties;
          const titleProp = Object.values(props).find(p => p.type === 'title');
          const checkProp = Object.values(props).find(p => p.type === 'checkbox');
          const title = titleProp?.title?.[0]?.plain_text || '（タイトルなし）';
          const done = checkProp?.checkbox || false;

          const li = document.createElement('li');
          li.className = done ? 'done' : '';
          li.innerHTML = `
            <div class="check">${done ? '✓' : ''}</div>
            <span>${title}</span>
          `;
          list.appendChild(li);
        });
      } catch (e) {
        document.getElementById('notion-list').innerHTML =
          `<li style="color:#ef4444;font-size:13px;padding:8px 0">エラー：${e.message}</li>`;
      }
    }

    fetchNotionTodos();
    setInterval(fetchNotionTodos, 60000); // 1分ごとに更新

    renderTodos();
    renderCalendar();
    initGoogleAuth();
  </script>
</body>
</html>
